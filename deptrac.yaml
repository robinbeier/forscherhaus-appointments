deptrac:
    paths:
        - ./application/controllers
        - ./application/libraries
        - ./application/models
        - ./application/helpers
        - ./application/core
    exclude_files: []
    layers:
        - name: Controllers
          collectors:
              - type: directory
                value: ./application/controllers/.*
        - name: Libraries
          collectors:
              - type: directory
                value: ./application/libraries/.*
        - name: Models
          collectors:
              - type: directory
                value: ./application/models/.*
        - name: Helpers
          collectors:
              - type: directory
                value: ./application/helpers/.*
        - name: Core
          collectors:
              - type: directory
                value: ./application/core/.*
    ruleset:
        Controllers:
            - Libraries
            - Models
            - Helpers
            - Core
        Libraries:
            - Libraries
            - Models
            - Helpers
            - Core
        Models:
            - Models
            - Helpers
            - Core
        Helpers:
            - Helpers
            - Core
        Core:
            - Core
            - Helpers
    # Deptrac 3 resolves EA_Controller's CodeIgniter @property service-locator hints.
    skip_violations:
        EA_Controller:
            - Admins_model
            - Appointments_model
            - Service_categories_model
            - Consents_model
            - Customers_model
            - Providers_model
            - Roles_model
            - Secretaries_model
            - Services_model
            - Settings_model
            - Unavailabilities_model
            - Users_model
            - Webhooks_model
            - Blocked_periods_model
            - Accounts
            - Api
            - Availability
            - Email_messages
            - Captcha_builder
            - Ics_file
            - Instance
            - Ldap_client
            - Notifications
            - Permissions
            - Synchronization
            - Timezones
            - Webhooks_client
