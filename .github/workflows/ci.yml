name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
      - labeled
      - unlabeled

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      deep_required: ${{ steps.filter.outputs.deep_required }}
      api_contract: ${{ steps.filter.outputs.api_contract }}
      booking_flows: ${{ steps.filter.outputs.booking_flows }}
      integration_smoke: ${{ steps.filter.outputs.integration_smoke }}
      write_contract_booking: ${{ steps.filter.outputs.write_contract_booking }}
      write_contract_api: ${{ steps.filter.outputs.write_contract_api }}

    steps:
      - name: Git clone
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deep_required:
              - 'application/**'
              - 'config/**'
              - 'database/**'
              - 'docker/**'
              - 'scripts/ci/**'
              - 'scripts/release-gate/**'
              - 'tests/**'
              - 'composer.json'
              - 'composer.lock'
              - 'phpunit*.xml'
              - 'index.php'
              - 'openapi.yml'
              - '.github/workflows/ci.yml'
            api_contract:
              - 'application/controllers/api/**'
              - 'application/libraries/Api.php'
              - 'application/models/**'
              - 'config/**'
              - 'docker/**'
              - 'scripts/ci/api_openapi_contract_smoke.php'
              - 'scripts/ci/config/api_openapi_contract_matrix.php'
              - 'openapi.yml'
              - 'composer.json'
              - 'composer.lock'
              - 'index.php'
              - '.github/workflows/ci.yml'
            booking_flows:
              - 'application/controllers/Booking*.php'
              - 'application/controllers/Appointments.php'
              - 'application/controllers/Calendar.php'
              - 'application/controllers/Customers.php'
              - 'application/models/**'
              - 'application/libraries/**'
              - 'application/helpers/**'
              - 'application/config/**'
              - 'database/**'
              - 'scripts/ci/**'
              - 'tests/Integration/Controllers/Booking*'
              - 'composer.json'
              - 'composer.lock'
              - 'index.php'
              - '.github/workflows/ci.yml'
            integration_smoke:
              - 'application/**'
              - 'config/**'
              - 'database/**'
              - 'docker/**'
              - 'scripts/ci/dashboard_integration_smoke.php'
              - 'scripts/release-gate/**'
              - 'composer.json'
              - 'composer.lock'
              - 'index.php'
              - 'openapi.yml'
              - '.github/workflows/ci.yml'
            write_contract_booking:
              - 'application/controllers/Booking*.php'
              - 'application/views/pages/booking*.php'
              - 'application/views/components/booking*.php'
              - 'application/models/**'
              - 'application/libraries/**'
              - 'application/libraries/Booking_request_dto_factory.php'
              - 'scripts/release-gate/**'
              - 'scripts/ci/booking_write_contract_smoke.php'
              - 'scripts/ci/lib/DeterministicFixtureFactory.php'
              - 'scripts/ci/lib/WriteContractCleanupRegistry.php'
              - 'scripts/ci/lib/FlakeRetry.php'
              - 'scripts/ci/lib/OpenApiContractValidator.php'
              - 'scripts/ci/config/api_openapi_write_contract_matrix.php'
              - 'composer.json'
              - 'composer.lock'
              - 'index.php'
              - '.github/workflows/ci.yml'
            write_contract_api:
              - 'application/controllers/api/**'
              - 'application/controllers/Booking*.php'
              - 'application/config/**'
              - 'application/models/**'
              - 'application/libraries/**'
              - 'application/libraries/Api.php'
              - 'application/libraries/Api_request_dto_factory.php'
              - 'application/libraries/Booking_request_dto_factory.php'
              - 'application/views/pages/booking*.php'
              - 'application/views/components/booking*.php'
              - 'scripts/release-gate/**'
              - 'scripts/ci/api_openapi_write_contract_smoke.php'
              - 'scripts/ci/config/api_openapi_write_contract_matrix.php'
              - 'scripts/ci/lib/OpenApiContractValidator.php'
              - 'scripts/ci/lib/DeterministicFixtureFactory.php'
              - 'scripts/ci/lib/WriteContractCleanupRegistry.php'
              - 'scripts/ci/lib/FlakeRetry.php'
              - 'openapi.yml'
              - 'composer.json'
              - 'composer.lock'
              - 'index.php'
              - '.github/workflows/ci.yml'

  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: PHPUnit Tests
        uses: php-actions/phpunit@v4
        env:
          TEST_NAME: Test
        with:
          configuration: phpunit.xml

  js-lint-changed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Git clone
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: ESLint changed JS files
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: ./scripts/ci/js-lint-changed.sh

  phpstan-application:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: PHPStan Application
        run: composer phpstan:application

  typed-request-dto:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: PHPStan Request DTO
        run: composer phpstan:request-dto
      - name: Request DTO Unit Tests
        run: composer test:request-dto
      - name: Request DTO Adoption Check
        run: php scripts/ci/check_request_dto_adoption.php

  typed-request-contracts:
    needs:
      - changes
    if: >
      needs.changes.outputs.deep_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: Frontend compile
        run: npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: PHPStan Request Contracts L1
        run: composer phpstan:request-contracts:l1
      - name: Request Contracts Unit Tests
        run: composer test:request-contracts
      - name: Request Contract Adoption Check
        run: php scripts/ci/check_request_contract_adoption.php
      - name: PHPStan Request Contracts L2
        if: always()
        run: composer phpstan:request-contracts:l2
      - name: Upload request-contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: request-contracts-artifacts
          path: |
            storage/logs/ci/request-contract-adoption-latest.json
            storage/logs/ci/phpstan-request-contracts-l2.raw
          if-no-files-found: warn
      - name: Diagnostics (request-contract reports)
        if: failure()
        run: |
          cat storage/logs/ci/request-contract-adoption-latest.json || true
          cat storage/logs/ci/phpstan-request-contracts-l2.raw || true

  deep-check-bootstrap:
    needs:
      - changes
    if: >
      needs.changes.outputs.deep_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache Composer downloads
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-cache-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: Archive deep-check dependencies
        run: |
          mkdir -p .ci-artifacts
          mkdir -p build
          tar -czf .ci-artifacts/deep-check-deps.tar.gz vendor node_modules build
      - name: Upload deep-check dependencies artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts/deep-check-deps.tar.gz
          if-no-files-found: error
          retention-days: 1

  coverage-delta:
    needs:
      - changes
      - deep-check-bootstrap
    # Keep push/main signal and run on non-draft PRs when deep checks are relevant.
    if: >
      needs.changes.outputs.deep_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start coverage services
        run: docker compose up -d mysql php-fpm
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Generate coverage report (unit + booking flow integration)
        run: docker compose exec -T php-fpm composer test:coverage:unit
      - name: Evaluate coverage delta policy
        run: docker compose exec -T php-fpm composer check:coverage:delta
      - name: Upload coverage delta artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-delta-artifacts
          path: |
            storage/logs/ci/coverage-unit-clover.xml
            storage/logs/ci/coverage-delta-latest.json
          if-no-files-found: warn
      - name: Diagnostics (coverage delta report)
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm || true
          cat storage/logs/ci/coverage-delta-latest.json || true
      - name: Cleanup coverage services
        if: always()
        run: docker compose down -v --remove-orphans

  architecture-ownership-map:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Git clone
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated architecture/ownership docs
        run: python3 scripts/docs/generate_architecture_ownership_docs.py --check
      - name: Validate architecture/ownership map
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 scripts/ci/check_architecture_ownership_map.py

  architecture-boundaries:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: Check generated CODEOWNERS
        run: python3 scripts/docs/generate_codeowners_from_map.py --check
      - name: Run Deptrac changed-file gate
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: bash scripts/ci/run_deptrac_changed_gate.sh
      - name: Run component boundary check
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: python3 scripts/ci/check_component_boundaries.py
      - name: Upload architecture boundary artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-boundaries-artifacts
          path: |
            storage/logs/ci/deptrac-changed-gate.json
            storage/logs/ci/deptrac-github-actions.log
            storage/logs/ci/component-boundary-latest.json
          if-no-files-found: warn
      - name: Diagnostics (failure reports)
        if: failure()
        run: |
          cat storage/logs/ci/deptrac-changed-gate.json || true
          cat storage/logs/ci/component-boundary-latest.json || true

  api-contract-openapi:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.api_contract == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start API contract services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run API OpenAPI contract smoke
        run: >
          docker compose exec -T php-fpm php scripts/ci/api_openapi_contract_smoke.php
          --base-url=http://nginx --index-page=index.php
          --openapi-spec=/var/www/html/openapi.yml
          --username=administrator --password=administrator
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          echo "API OpenAPI contract smoke failed; dumping docker compose diagnostics."
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
      - name: Cleanup API contract services
        if: always()
        run: docker compose down -v --remove-orphans

  write-contract-booking:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.write_contract_booking == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Blocking gate after rollout precondition (7/7 executed green PR runs) was met.

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start booking write-contract services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run booking write-path contract smoke
        run: >
          docker compose exec -T php-fpm composer contract-test:booking-write --
          --base-url=http://nginx --index-page=index.php
          --username=administrator --password=administrator
          --booking-search-days=14 --retry-count=1
      - name: Upload booking write-contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: booking-write-contract-artifacts
          path: storage/logs/ci/booking-write-contract-*.json
          if-no-files-found: warn
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          echo "Booking write contract smoke failed; dumping diagnostics."
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
          ls -t storage/logs/ci/booking-write-contract-*.json 2>/dev/null | head -n 1 | xargs -I{} cat "{}" || true
      - name: Cleanup booking write-contract services
        if: always()
        run: docker compose down -v --remove-orphans

  write-contract-api:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.write_contract_api == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Blocking phase: rollout precondition satisfied (7 executed green PR runs).

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start API write-contract services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run API OpenAPI write-path contract smoke
        run: >
          docker compose exec -T php-fpm composer contract-test:api-openapi-write --
          --base-url=http://nginx --index-page=index.php
          --openapi-spec=/var/www/html/openapi.yml
          --username=administrator --password=administrator
          --retry-count=1 --booking-search-days=14
      - name: Upload API write-contract artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-write-contract-artifacts
          path: storage/logs/ci/api-openapi-write-contract-*.json
          if-no-files-found: warn
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          echo "API OpenAPI write contract smoke failed; dumping diagnostics."
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
          ls -t storage/logs/ci/api-openapi-write-contract-*.json 2>/dev/null | head -n 1 | xargs -I{} cat "{}" || true
      - name: Cleanup API write-contract services
        if: always()
        run: docker compose down -v --remove-orphans

  booking-controller-flows:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.booking_flows == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start booking flow test services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run booking controller flow tests
        run: docker compose exec -T php-fpm composer test:booking-controller-flows
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          echo "Booking controller flow tests failed; dumping docker compose diagnostics."
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
      - name: Cleanup booking flow test services
        if: always()
        run: docker compose down -v --remove-orphans

  integration-smoke:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.integration_smoke == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v4
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -d node_modules
          test -d build
      - name: Start integration services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run dashboard+booking+api integration smoke
        run: >
          docker compose exec -T php-fpm php scripts/ci/dashboard_integration_smoke.php
          --base-url=http://nginx --index-page=index.php
          --username=administrator --password=administrator
          --start-date=2026-01-01 --end-date=2026-01-31
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          echo "Integration smoke failed; dumping docker compose diagnostics."
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
      - name: Cleanup integration services
        if: always()
        run: docker compose down -v --remove-orphans
