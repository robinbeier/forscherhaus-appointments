      - name: Wait for PDF renderer health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:3003/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          echo "pdf-renderer health check timed out" >&2
          docker compose logs pdf-renderer || true
          exit 1
      - name: Evaluate PDF renderer latency
        run: |
          set +e
          php scripts/ci/check_pdf_renderer_latency.php \
            --base-url=http://localhost:3003 \
            --output-json=storage/logs/ci/pdf-renderer-latency-latest.json
