  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
          extensions: gd
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          php_extensions: gd
          version: 2
      - name: PHPUnit Tests
        uses: php-actions/phpunit@v4
        env:
          TEST_NAME: Test
        with:
          configuration: phpunit.xml

  js-lint-changed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Git clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: ESLint changed JS files
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: ./scripts/ci/js-lint-changed.sh

  phpstan-application:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
          extensions: gd
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          php_extensions: gd
          version: 2
      - name: PHPStan Application
        run: composer phpstan:application

  typed-request-dto:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
          extensions: gd
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          php_extensions: gd
          version: 2
      - name: PHPStan Request DTO
        run: composer phpstan:request-dto
      - name: Request DTO Unit Tests
        run: composer test:request-dto
      - name: Request DTO Adoption Check
        run: php scripts/ci/check_request_dto_adoption.php

  typed-request-contracts:
    needs:
      - changes
    if: >
      needs.changes.outputs.request_contracts_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund
      - name: Frontend compile
        run: npx gulp compile
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
          extensions: gd
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          php_extensions: gd
          version: 2
      - name: PHPStan Request Contracts L1
        run: composer phpstan:request-contracts:l1
      - name: Request Contracts Unit Tests
        run: composer test:request-contracts
      - name: Request Contract Adoption Check
        run: php scripts/ci/check_request_contract_adoption.php
      - name: PHPStan Request Contracts L2
        if: always()
        run: composer phpstan:request-contracts:l2
      - name: Upload request-contract artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: request-contracts-artifacts
          path: |
            storage/logs/ci/request-contract-adoption-latest.json
            storage/logs/ci/phpstan-request-contracts-l2.raw
          if-no-files-found: warn
      - name: Diagnostics (request-contract reports)
        if: failure()
        run: |
          cat storage/logs/ci/request-contract-adoption-latest.json || true
          cat storage/logs/ci/phpstan-request-contracts-l2.raw || true

  deep-check-bootstrap:
    needs:
      - changes
    if: >
      needs.changes.outputs.deep_bootstrap_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-cache-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.4
          php_extensions: gd
          version: 2
      - name: Archive deep-check dependencies
        run: |
          mkdir -p .ci-artifacts
          tar -czf .ci-artifacts/deep-check-deps.tar.gz vendor
      - name: Upload deep-check dependencies artifact
        uses: actions/upload-artifact@v7
        with:
          name: deep-check-deps
          path: .ci-artifacts/deep-check-deps.tar.gz
          if-no-files-found: error
          retention-days: 1

  deep-check-seed-snapshot:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.coverage_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -f vendor/autoload.php
      - name: Start seed snapshot services
        env:
          EA_SKIP_NPM_BOOTSTRAP: "1"
          EA_SKIP_ASSET_BUILD_BOOTSTRAP: "1"
        run: docker compose up -d mysql php-fpm
      - name: Wait for MySQL readiness
        run: bash scripts/ci/wait_for_mysql_readiness.sh
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Export deterministic seed snapshot
        run: bash scripts/ci/export_deep_seed_snapshot.sh .ci-artifacts/deep-check-seed.sql.gz
      - name: Upload deterministic seed snapshot artifact
        uses: actions/upload-artifact@v7
        with:
          name: deep-check-seed-snapshot
          path: .ci-artifacts/deep-check-seed.sql.gz
          if-no-files-found: error
          retention-days: 1
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm || true
      - name: Cleanup seed snapshot services
        if: always()
        run: docker compose down -v --remove-orphans

  deep-runtime-suite:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      (
        needs.changes.outputs.api_contract == 'true' ||
        needs.changes.outputs.booking_flows == 'true' ||
        needs.changes.outputs.integration_smoke == 'true' ||
        needs.changes.outputs.write_contract_booking == 'true' ||
        needs.changes.outputs.write_contract_api == 'true'
      ) &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -f vendor/autoload.php
      - name: Prepare deep runtime suite artifact directory
        run: |
          rm -rf storage/logs/ci/deep-runtime-suite
          mkdir -p storage/logs/ci/deep-runtime-suite
          touch storage/logs/ci/deep-runtime-suite/.placeholder
      - name: Resolve requested deep runtime suites
        id: suites
        run: |
          suites=()

          if [[ "${{ needs.changes.outputs.api_contract }}" == "true" ]]; then
            suites+=("api-contract-openapi")
          fi

          if [[ "${{ needs.changes.outputs.write_contract_booking }}" == "true" ]]; then
            suites+=("write-contract-booking")
          fi

          if [[ "${{ needs.changes.outputs.write_contract_api }}" == "true" ]]; then
            suites+=("write-contract-api")
          fi

          if [[ "${{ needs.changes.outputs.booking_flows }}" == "true" ]]; then
            suites+=("booking-controller-flows")
          fi

          if [[ "${{ needs.changes.outputs.integration_smoke }}" == "true" ]]; then
            suites+=("integration-smoke")
          fi

          if [[ "${#suites[@]}" -eq 0 ]]; then
            echo "::error::No deep runtime suites were requested." >&2
            exit 1
          fi

          {
            echo "requested=$(IFS=,; echo "${suites[*]}")"
          } >> "$GITHUB_OUTPUT"
      - name: Resolve LDAP guardrail scope
        id: ldap_guardrail
        run: |
          include_ldap="false"

          if [[ "${{ needs.changes.outputs.integration_smoke }}" == "true" ]]; then
            if [[ "${{ github.event_name }}" == "push" || "${{ needs.changes.outputs.ldap_guardrail_required }}" == "true" ]]; then
              include_ldap="true"
            fi
          fi

          {
            echo "include_ldap=${include_ldap}"
          } >> "$GITHUB_OUTPUT"
      - name: Start deep runtime services
        env:
          EA_SKIP_NPM_BOOTSTRAP: "1"
          EA_SKIP_ASSET_BUILD_BOOTSTRAP: "1"
        run: |
          services=(mysql php-fpm nginx)

          if [[ "${{ steps.ldap_guardrail.outputs.include_ldap }}" == "true" ]]; then
            services+=(openldap)
          fi

          docker compose up -d "${services[@]}"
      - name: Wait for MySQL readiness
        run: bash scripts/ci/wait_for_mysql_readiness.sh
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run deep runtime suite
        run: >
          docker compose exec -T php-fpm php scripts/ci/run_deep_runtime_suite.php
          --suites=${{ steps.suites.outputs.requested }}
          --base-url=http://nginx --index-page=index.php
          --openapi-spec=/var/www/html/openapi.yml
          --username=administrator --password=administrator
          --booking-search-days=14 --retry-count=1
          --start-date=2026-01-01 --end-date=2026-01-31
          --integration-smoke-include-ldap=${{ steps.ldap_guardrail.outputs.include_ldap }}
          --report-dir=storage/logs/ci/deep-runtime-suite
      - name: Upload deep runtime suite artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: deep-runtime-suite-artifacts
          path: storage/logs/ci/deep-runtime-suite
          if-no-files-found: error
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm nginx || true
          cat storage/logs/ci/deep-runtime-suite/manifest.json || true
      - name: Cleanup deep runtime services
        if: always()
        run: docker compose down -v --remove-orphans

  coverage-shard-unit:
    needs:
      - changes
      - deep-check-bootstrap
    if: >
      needs.changes.outputs.coverage_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: xdebug
          extensions: gd
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -f vendor/autoload.php
      - name: Run coverage shard (unit)
        run: composer test:coverage:unit-shard
      - name: Upload coverage shard unit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-unit-artifacts
          path: |
            storage/logs/ci/coverage-shard-unit.phpcov
            storage/logs/ci/coverage-shard-unit-clover.xml
          if-no-files-found: error
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          php -v || true
          ls -la storage/logs/ci || true

  coverage-shard-integration:
    needs:
      - changes
      - deep-check-bootstrap
      - deep-check-seed-snapshot
    if: >
      needs.changes.outputs.coverage_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Download deterministic seed snapshot artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-seed-snapshot
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -f vendor/autoload.php
      - name: Start coverage shard services
        env:
          EA_SKIP_NPM_BOOTSTRAP: "1"
          EA_SKIP_ASSET_BUILD_BOOTSTRAP: "1"
        run: docker compose up -d mysql php-fpm
      - name: Wait for MySQL readiness
        run: bash scripts/ci/wait_for_mysql_readiness.sh
      - name: Import deterministic seed snapshot
        run: bash scripts/ci/import_deep_seed_snapshot.sh .ci-artifacts/deep-check-seed.sql.gz
      - name: Run coverage shard (integration)
        run: docker compose exec -T php-fpm composer test:coverage:integration-shard
      - name: Upload coverage shard integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-shard-integration-artifacts
          path: |
            storage/logs/ci/coverage-shard-integration.phpcov
            storage/logs/ci/coverage-shard-integration-clover.xml
          if-no-files-found: error
      - name: Diagnostics (failure logs)
        if: failure()
        run: |
          docker compose ps || true
          docker compose logs --no-color --timestamps mysql php-fpm || true
      - name: Cleanup coverage shard services
        if: always()
        run: docker compose down -v --remove-orphans

  coverage-delta:
    needs:
      - changes
      - deep-check-bootstrap
      - coverage-shard-unit
      - coverage-shard-integration
    # Keep push/main signal and run on non-draft PRs when deep checks are relevant.
    if: >
      needs.changes.outputs.coverage_required == 'true' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Download deep-check dependencies artifact
        uses: actions/download-artifact@v8
        with:
          name: deep-check-deps
          path: .ci-artifacts
      - name: Restore deep-check dependencies
        run: |
          tar -xzf .ci-artifacts/deep-check-deps.tar.gz
          test -d vendor
          test -f vendor/autoload.php
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
      - name: Download coverage shard unit artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-shard-unit-artifacts
          path: storage/logs/ci
      - name: Download coverage shard integration artifacts
        uses: actions/download-artifact@v8
        with:
          name: coverage-shard-integration-artifacts
          path: storage/logs/ci
      - name: Merge shard coverage reports
        run: |
          test -f storage/logs/ci/coverage-shard-unit-clover.xml
          test -f storage/logs/ci/coverage-shard-integration-clover.xml
          php scripts/ci/merge_coverage_shards.php \
            --input=storage/logs/ci/coverage-shard-unit-clover.xml \
            --input=storage/logs/ci/coverage-shard-integration-clover.xml \
            --output-clover=storage/logs/ci/coverage-unit-clover.xml \
            --output-json=storage/logs/ci/coverage-merge-latest.json
      - name: Evaluate coverage delta policy
        run: >
          php scripts/ci/check_coverage_delta.php
          --clover=storage/logs/ci/coverage-unit-clover.xml
          --policy=scripts/ci/config/coverage_delta_policy.php
          --output-json=storage/logs/ci/coverage-delta-latest.json
      - name: Upload coverage delta artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-delta-artifacts
          path: |
            storage/logs/ci/coverage-shard-unit-clover.xml
            storage/logs/ci/coverage-shard-integration-clover.xml
            storage/logs/ci/coverage-unit-clover.xml
            storage/logs/ci/coverage-merge-latest.json
            storage/logs/ci/coverage-delta-latest.json
          if-no-files-found: warn
      - name: Diagnostics (coverage delta report)
        if: failure()
        run: |
          cat storage/logs/ci/coverage-merge-latest.json || true
          cat storage/logs/ci/coverage-delta-latest.json || true

  heavy-job-duration-trends:
    needs:
      - changes
      - deep-runtime-suite
      - coverage-shard-unit
      - coverage-shard-integration
      - coverage-delta
    if: >
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.changes.outputs.deep_bootstrap_required == 'true' ||
        needs.changes.outputs.coverage_required == 'true' ||
        needs.changes.outputs.heavy_job_trends_required == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read

    steps:
      - name: Git clone
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4.1"
          coverage: none
      - name: Evaluate heavy job duration trends
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set +e
          php scripts/ci/check_heavy_job_duration_trends.php \
            --output-json=storage/logs/ci/heavy-job-duration-trends-latest.json
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::heavy-job-duration-trends exited with status ${status}; see storage/logs/ci/heavy-job-duration-trends-latest.json."
          fi
      - name: Upload heavy job trend artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: heavy-job-duration-trends-artifacts
          path: storage/logs/ci/heavy-job-duration-trends-latest.json
