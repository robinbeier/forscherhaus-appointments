name: CI

on: [ push ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: PHPUnit Tests
        uses: php-actions/phpunit@v4
        env:
          TEST_NAME: Test
        with:
          configuration: phpunit.xml

  integration-smoke:
    runs-on: ubuntu-latest
    needs: build-test
    continue-on-error: true

    steps:
      - name: Git clone
        uses: actions/checkout@v2
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Frontend compile
        run: |
          npm ci --no-audit --no-fund
          npx gulp compile
      - name: Install dependencies
        uses: php-actions/composer@v6
        with:
          php_version: 8.3
          php_extensions: gd
          version: 2
      - name: Start integration services
        run: docker compose up -d mysql php-fpm nginx
      - name: Wait for MySQL readiness
        run: |
          max_attempts=60

          attempt=1
          until docker compose exec -T mysql mysqladmin ping -h localhost -uroot -psecret --silent; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL root readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done

          attempt=1
          until docker compose exec -T mysql mysql -uuser -ppassword -e "USE easyappointments; SELECT 1;" >/dev/null 2>&1; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::MySQL app-user readiness timed out after ${max_attempts} attempts." >&2
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
      - name: Install deterministic seed instance
        run: |
          for attempt in 1 2 3; do
            if docker compose exec -T php-fpm php index.php console install; then
              exit 0
            fi
            echo "::warning::console install failed on attempt ${attempt}; retrying in 3s." >&2
            sleep 3
          done
          echo "::error::console install failed after 3 attempts." >&2
          exit 1
      - name: Run dashboard integration smoke
        run: >
          docker compose exec -T php-fpm php scripts/ci/dashboard_integration_smoke.php
          --base-url=http://nginx --index-page=index.php
          --username=administrator --password=administrator
          --start-date=2026-01-01 --end-date=2026-01-31
      - name: Cleanup integration services
        if: always()
        run: docker compose down -v --remove-orphans
