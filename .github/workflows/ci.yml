name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
      - labeled
      - unlabeled

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      request_contracts_required: ${{ steps.filter.outputs.request_contracts_required }}
      deep_bootstrap_required: ${{ steps.filter.outputs.deep_bootstrap_required }}
      coverage_required: ${{ steps.filter.outputs.coverage_required }}
      heavy_job_trends_required: ${{ steps.filter.outputs.heavy_job_trends_required }}
      pdf_renderer_latency_required: ${{ steps.filter.outputs.pdf_renderer_latency_required }}
      api_contract: ${{ steps.filter.outputs.api_contract }}
      booking_flows: ${{ steps.filter.outputs.booking_flows }}
      integration_smoke: ${{ steps.filter.outputs.integration_smoke }}
      ldap_guardrail_required: ${{ steps.filter.outputs.ldap_guardrail_required }}
      write_contract_booking: ${{ steps.filter.outputs.write_contract_booking }}
      write_contract_api: ${{ steps.filter.outputs.write_contract_api }}

    steps:
      - name: Git clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            request_contracts_required:
              - 'application/controllers/Account.php'
              - 'application/controllers/Login.php'
              - 'application/controllers/Recovery.php'
              - 'application/controllers/Localization.php'
              - 'application/controllers/Booking*.php'
              - 'application/controllers/Appointments.php'
              - 'application/controllers/Blocked_periods.php'
              - 'application/controllers/Unavailabilities.php'
              - 'application/controllers/Calendar.php'
              - 'application/controllers/Admins.php'
              - 'application/controllers/Providers.php'
              - 'application/controllers/Customers.php'
              - 'application/controllers/Secretaries.php'
              - 'application/controllers/Services.php'
              - 'application/controllers/Service_categories.php'
              - 'application/controllers/Api_settings.php'
              - 'application/controllers/Booking_settings.php'
              - 'application/controllers/Business_settings.php'
              - 'application/controllers/General_settings.php'
              - 'application/controllers/Google_analytics_settings.php'
              - 'application/controllers/Matomo_analytics_settings.php'
