services:
    php-fpm:
        build: docker/php-fpm
        working_dir: /var/www/html
        environment:
            - EA_SKIP_NPM_BOOTSTRAP=${EA_SKIP_NPM_BOOTSTRAP:-0}
            - EA_SKIP_ASSET_BUILD_BOOTSTRAP=${EA_SKIP_ASSET_BUILD_BOOTSTRAP:-0}
        extra_hosts:
            - host.docker.internal:host-gateway
        volumes:
            - '.:/var/www/html'
            - './docker/php-fpm/php-ini-overrides.ini:/usr/local/etc/php/conf.d/99-overrides.ini'

    nginx:
        image: 'nginx:1.29.6-alpine'
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
            - './docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf'
        ports:
            - '80:80'

    mysql:
        image: 'mysql:8.4.8'
        volumes:
            - '${EA_MYSQL_DATA_PATH:-./docker/mysql}:/var/lib/mysql'
        environment:
            - MYSQL_ROOT_PASSWORD=secret
            - MYSQL_DATABASE=easyappointments
            - MYSQL_USER=user
            - MYSQL_PASSWORD=password
        ports:
            - '3306:3306'

    phpmyadmin:
        image: 'phpmyadmin:5.2.3'
        ports:
            - '8080:80'
        environment:
            - 'PMA_HOST=mysql'
            - 'UPLOAD_LIMIT=102400K'

    mailpit:
        image: 'axllent/mailpit:v1.29.3'
        ports:
            - '8025:8025'
            - '1025:1025'

    swagger-ui:
        platform: linux/amd64
        image: swaggerapi/swagger-ui:v5.32.0
        ports:
            - '8000:8080'
        volumes:
            - ./openapi.yml:/usr/share/nginx/html/openapi.yml
        environment:
            API_URL: openapi.yml

    baikal:
        image: ckulka/baikal:0.10.1-apache-php8.2
        ports:
            - '8100:80'
        volumes:
            - ./docker/baikal/config:/var/www/baikal/config
            - ./docker/baikal/data:/var/www/baikal/Specific

    openldap:
        image: vegardit/openldap@sha256:efa7cff027fa2ac503b073161849f93e4ccaaa1b9ac0a9788814865032952564
        hostname: openldap
        ports:
            - '389:389'
            - '636:636'
        volumes:
            - ./docker/ldap/vegardit/init_org_tree.ldif:/opt/ldifs/init_org_tree.ldif:ro
            - ./docker/ldap/vegardit/init_org_entries.ldif:/opt/ldifs/init_org_entries.ldif:ro
            - ./docker/openldap/var:/var/lib/ldap
            - ./docker/openldap/etc:/etc/ldap/slapd.d
        environment:
            - LDAP_INIT_ORG_DN=dc=example,dc=org
            - LDAP_INIT_ORG_NAME=example
            - LDAP_INIT_ROOT_USER_DN=cn=admin,dc=example,dc=org
            - LDAP_INIT_ROOT_USER_PW=admin

    openldap-legacy:
        profiles:
            - ldap-legacy
        image: osixia/openldap:1.5.0
        hostname: openldap-legacy
        ports:
            - '1389:389'
            - '1636:636'
        volumes:
            - ./docker/openldap-legacy/certificates:/container/service/slapd/assets/certs
            - ./docker/openldap-legacy/slapd/database:/var/lib/ldap
            - ./docker/openldap-legacy/slapd/config:/etc/ldap/slapd.d
        environment:
            - LDAP_ORGANISATION=example
            - LDAP_DOMAIN=example.org
            - LDAP_ADMIN_USERNAME=admin
            - LDAP_ADMIN_PASSWORD=admin
            - LDAP_CONFIG_PASSWORD=config_pass
            - 'LDAP_BASE_DN=dc=example,dc=org'

    pdf-renderer:
        platform: linux/amd64
        build: ./pdf-renderer
        environment:
            - NODE_ENV=production
        ports:
            - '3003:3000'
        shm_size: '1gb'
        healthcheck:
            test: ['CMD', 'curl', '-fsS', 'http://localhost:3000/healthz']
            interval: 30s
            timeout: 3s
            retries: 3
